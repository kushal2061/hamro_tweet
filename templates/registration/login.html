{% extends "layout.html" %}

{% block content %}

<div class="container m-3">
<div class="card border-0 shadow-sm rounded-4 mx-auto" style="max-width: 400px;">
<div class="card-body">
  <p class=" mb-4 fw-bold fs-2 text-center">Login</p>

  <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
         <div class="alert alert-danger">
        {{ form.non_field_errors }}
            </div>
            {% endif %}
        
        <div class="mb-3">
          <label for="id_username" class="fw-bold">Username</label>
          {{ form.username }}
          {{ form.username.errors }}
        </div>

        <div class="mb-3">
          <label for="id_password" class="fw-bold">Password</label>
          {{ form.password }}
          {{ form.password.errors }}
        </div>

        <div class="d-grid mt-3">
          <button type="submit" class="btn btn-primary">Login</button>
        </div>
      </form>
<p>Dont have account? <a href="{%url 'register'%}">Register here</a></p>

    </div>
  </div>
</div>
{% endblock %}
